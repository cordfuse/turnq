services:
  turnq:
    image: ghcr.io/cordfuse/turnq:0.4.1
    container_name: turnq
    ports:
      - "3003:3003"
    environment:
      - TURNQ_API_KEY=${TURNQ_API_KEY}
      - PORT=3003
    restart: unless-stopped
    healthcheck:
      # base image has no curl/wget — bun fetch instead
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3003/health').then(r => process.exit(r.ok ? 0 : 1), () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - proxy_net
      - default

networks:
  proxy_net:
    external: true
