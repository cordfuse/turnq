services:
  turnq:
    build: .
    container_name: turnq
    ports:
      - "3003:3003"
    environment:
      - TURNQ_API_KEY=${TURNQ_API_KEY}
      - PORT=3003
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - proxy_net
      - default

networks:
  proxy_net:
    external: true
