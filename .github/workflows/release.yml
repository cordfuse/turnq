name: Release — turnq

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies and build
        run: npm install

      - name: Pack tarball
        run: npm pack

      - name: Compute version without v prefix
        id: vinfo
        run: echo "vnum=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: turnq ${{ github.ref_name }}
          body: |
            `@cordfuse/turnq` ${{ github.ref_name }} — named-channel turn coordinator.

            **Install:**

            ```sh
            npm install @cordfuse/turnq
            ```

            **Quick start (local mode — no server needed):**

            ```typescript
            import { createCoordinator } from '@cordfuse/turnq/coordinator';

            const coordinator = await createCoordinator();
            await coordinator.withTurn('my-channel', async () => {
              // only one process holds this at a time
            });
            ```

            **Distributed mode:**

            ```typescript
            const coordinator = await createCoordinator({
              url: process.env.TURNQ_URL,
              apiKey: process.env.TURNQ_API_KEY,
            });
            ```

            See the [README](https://github.com/cordfuse/turnq#readme) for full documentation.
          files: |
            cordfuse-turnq-*.tgz

      - name: Determine npm dist-tag
        id: npmtag
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: npm publish --access public --tag ${{ steps.npmtag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
